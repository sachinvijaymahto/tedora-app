<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TedoraKids">
<meta name="theme-color" content="#FBF3F1">
<title>TedoraKids Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF3F1;
    --surface:#FFFFFF;
    --surface-2:#FCF7F5;
    --ink:#3A2A32;
    --ink-soft:#7A6670;
    --ink-faint:#A896A0;
    --line:#F0E2DE;
    --line-2:#E7D6D1;
    --accent:#B03A63;
    --accent-soft:#F6E4EC;
    --accent-ink:#8C2C4E;
    --sage:#7E9B84;
    --gold:#C99A3C;
    --shadow:0 1px 2px rgba(58,42,50,.04),0 4px 16px rgba(58,42,50,.06);
    --shadow-lg:0 8px 30px rgba(58,42,50,.14);
    --r:16px;
    --r-sm:11px;
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Nunito Sans',-apple-system,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    font-size:15px;line-height:1.45;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;margin:0;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
  .app{max-width:520px;margin:0 auto;min-height:100vh;position:relative}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    background:rgba(251,243,241,.9);backdrop-filter:blur(12px);
    padding:calc(var(--safe-t) + 14px) 20px 12px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{
    width:30px;height:30px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),#D26A8E);
    display:grid;place-items:center;box-shadow:0 2px 8px rgba(176,58,99,.35);
  }
  .brand .mark svg{width:17px;height:17px}
  .brand h1{font-size:20px;font-weight:600;color:var(--ink)}
  .brand h1 span{color:var(--accent)}
  .topbar .sub{font-size:12px;color:var(--ink-faint);margin-top:1px;letter-spacing:.02em;font-weight:600}

  /* ---------- Views ---------- */
  main{padding:16px 16px 120px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .screen-title{font-size:23px;margin:6px 2px 14px}

  /* ---------- Dashboard ---------- */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}
  .stat{
    background:var(--surface);border-radius:var(--r);padding:15px 15px 14px;
    box-shadow:var(--shadow);border:1px solid var(--line);
  }
  .stat .n{font-family:'Fraunces',serif;font-size:27px;font-weight:600;line-height:1;color:var(--ink)}
  .stat .n.accent{color:var(--accent)}
  .stat .n.sage{color:var(--sage)}
  .stat .n.gold{color:var(--gold)}
  .stat .l{font-size:12px;color:var(--ink-soft);margin-top:7px;font-weight:700;letter-spacing:.01em}
  .stat .l small{display:block;font-weight:600;color:var(--ink-faint);letter-spacing:0}

  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:22px 2px 12px}
  .section-head h2{font-size:17px}
  .section-head .link{font-size:13px;color:var(--accent);font-weight:700}

  .pipeline-strip{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;margin:0 -2px;-webkit-overflow-scrolling:touch}
  .pipeline-strip::-webkit-scrollbar{display:none}
  .pipe-chip{
    flex:0 0 auto;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:10px 13px;min-width:82px;box-shadow:var(--shadow);
    text-align:left;transition:transform .12s;
  }
  .pipe-chip:active{transform:scale(.96)}
  .pipe-chip .c{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1}
  .pipe-chip .t{font-size:10.5px;color:var(--ink-soft);margin-top:5px;font-weight:700;line-height:1.2}
  .pipe-chip .dot{width:8px;height:8px;border-radius:50%;margin-bottom:8px}

  /* ---------- Order cards ---------- */
  .order-card{
    background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:11px;
    box-shadow:var(--shadow);border:1px solid var(--line);
    display:block;width:100%;text-align:left;transition:transform .12s,box-shadow .12s;
  }
  .order-card:active{transform:scale(.985)}
  .oc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .oc-name{font-weight:800;font-size:15.5px;color:var(--ink)}
  .oc-ig{font-size:12.5px;color:var(--ink-faint);font-weight:600;margin-top:1px}
  .oc-desc{font-size:13.5px;color:var(--ink-soft);margin-top:8px;font-weight:600;line-height:1.35}
  .oc-meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:8px}
  .oc-amt{font-weight:800;font-size:14.5px}
  .oc-amt .due{color:var(--accent);font-size:12px;font-weight:700;margin-left:6px}
  .oc-date{font-size:11.5px;color:var(--ink-faint);font-weight:700}
  .oc-date.late{color:var(--accent)}

  .badge{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;
    padding:5px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.01em;
  }
  .badge .bd{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* ---------- Filter bar ---------- */
  .searchbar{position:relative;margin-bottom:12px}
  .searchbar input{
    width:100%;padding:12px 14px 12px 40px;border-radius:13px;border:1px solid var(--line-2);
    background:var(--surface);outline:none;font-size:15px;
  }
  .searchbar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .searchbar svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--ink-faint)}
  .filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin:0 -16px 8px;padding-left:16px;padding-right:16px}
  .filter-row::-webkit-scrollbar{display:none}
  .fchip{
    flex:0 0 auto;padding:7px 13px;border-radius:20px;background:var(--surface);
    border:1px solid var(--line-2);font-size:12.5px;font-weight:700;color:var(--ink-soft);
    transition:all .12s;
  }
  .fchip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sort-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:12.5px;color:var(--ink-faint);font-weight:700}
  .sort-row select{
    border:1px solid var(--line-2);border-radius:9px;padding:5px 8px;background:var(--surface);
    font-size:12.5px;font-weight:700;color:var(--ink-soft);
  }

  /* ---------- Empty states ---------- */
  .empty{text-align:center;padding:48px 24px;color:var(--ink-faint)}
  .empty .ico{width:56px;height:56px;margin:0 auto 16px;border-radius:18px;background:var(--accent-soft);display:grid;place-items:center}
  .empty .ico svg{width:26px;height:26px;stroke:var(--accent)}
  .empty h3{font-size:17px;color:var(--ink);margin-bottom:6px}
  .empty p{font-size:13.5px;line-height:1.5;max-width:250px;margin:0 auto}

  /* ---------- Order detail ---------- */
  .detail-hero{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:16px}
  .dh-name{font-family:'Fraunces',serif;font-size:22px;font-weight:600}
  .dh-ig{font-size:13px;color:var(--ink-faint);font-weight:700;margin-top:2px}
  .dh-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

  /* stitched pipeline */
  .stitch{margin:18px 0 4px;padding:2px}
  .stitch-label{font-size:12px;font-weight:800;color:var(--ink-faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px}
  .stitch-track{position:relative;padding-left:6px}
  .stitch-step{position:relative;padding-left:30px;padding-bottom:16px}
  .stitch-step:last-child{padding-bottom:2px}
  .stitch-step::before{
    content:"";position:absolute;left:9px;top:16px;bottom:-2px;width:0;
    border-left:2px dashed var(--line-2);
  }
  .stitch-step:last-child::before{display:none}
  .stitch-step.done::before{border-left-color:var(--accent)}
  .stitch-node{
    position:absolute;left:2px;top:2px;width:16px;height:16px;border-radius:50%;
    background:var(--surface);border:2px solid var(--line-2);z-index:2;
  }
  .stitch-step.done .stitch-node{background:var(--accent);border-color:var(--accent)}
  .stitch-step.current .stitch-node{
    border-color:var(--accent);background:var(--surface);
    box-shadow:0 0 0 4px var(--accent-soft);
  }
  .stitch-step.current .stitch-node::after{
    content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent);
  }
  .stitch-txt{font-size:13.5px;font-weight:700;color:var(--ink-faint);line-height:1.3}
  .stitch-step.done .stitch-txt,.stitch-step.current .stitch-txt{color:var(--ink)}
  .stitch-time{font-size:11px;color:var(--ink-faint);font-weight:600;margin-top:2px}

  .status-actions{display:flex;gap:10px;margin:16px 0}
  .btn{
    flex:1;padding:13px;border-radius:13px;font-weight:800;font-size:14px;
    display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s;
  }
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(176,58,99,.3)}
  .btn-ghost{background:var(--surface);color:var(--ink-soft);border:1px solid var(--line-2)}
  .btn-block{width:100%}
  .btn svg{width:16px;height:16px}

  .info-card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px;overflow:hidden}
  .info-card .ic-head{padding:13px 16px;border-bottom:1px solid var(--line);font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint)}
  .info-row{display:flex;padding:11px 16px;border-bottom:1px solid var(--line);gap:12px;align-items:flex-start}
  .info-row:last-child{border-bottom:none}
  .info-row .k{flex:0 0 108px;font-size:12.5px;color:var(--ink-faint);font-weight:700;padding-top:1px}
  .info-row .v{flex:1;font-size:14px;font-weight:600;color:var(--ink);word-break:break-word;white-space:pre-wrap}
  .info-row .v.empty-v{color:var(--ink-faint);font-weight:600;font-style:italic}
  .link-btn{color:var(--accent);font-weight:800;font-size:13px}
  .img-strip{display:flex;gap:8px;overflow-x:auto;padding:12px 16px}
  .img-strip img{height:88px;width:88px;object-fit:cover;border-radius:10px;border:1px solid var(--line-2);flex:0 0 auto}

  .wa-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;
    border-radius:13px;background:#e8f5ec;color:#1b7a43;font-weight:800;font-size:14px;margin-bottom:14px;
    border:1px solid #cdebd7;
  }
  .wa-btn svg{width:18px;height:18px}

  /* ---------- Forms ---------- */
  .form-group{margin-bottom:15px}
  .form-group label{display:block;font-size:12.5px;font-weight:800;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.01em}
  .form-group input,.form-group select,.form-group textarea{
    width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line-2);
    background:var(--surface);outline:none;transition:border .12s,box-shadow .12s;
  }
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{
    border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)
  }
  .form-group textarea{resize:vertical;min-height:64px;line-height:1.4}
  .form-row{display:flex;gap:11px}
  .form-row .form-group{flex:1}
  .form-section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin:22px 2px 12px;color:var(--accent-ink)}
  .form-section-title:first-child{margin-top:4px}
  .balance-hint{font-size:12.5px;font-weight:700;color:var(--sage);margin-top:6px}
  .img-upload{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .img-thumb{position:relative;width:70px;height:70px;border-radius:10px;overflow:hidden;border:1px solid var(--line-2)}
  .img-thumb img{width:100%;height:100%;object-fit:cover}
  .img-thumb .x{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(58,42,50,.75);color:#fff;font-size:13px;display:grid;place-items:center;line-height:1}
  .img-add{width:70px;height:70px;border-radius:10px;border:1.5px dashed var(--line-2);display:grid;place-items:center;color:var(--ink-faint);background:var(--surface-2)}
  .img-add svg{width:22px;height:22px;stroke:var(--ink-faint)}

  /* ---------- Tailors ---------- */
  .tailor-card{background:var(--surface);border-radius:var(--r);padding:15px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:11px;display:flex;align-items:center;gap:13px}
  .tailor-av{width:44px;height:44px;border-radius:13px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:600;font-size:19px;flex:0 0 auto}
  .tailor-info{flex:1;min-width:0}
  .tailor-info .nm{font-weight:800;font-size:15px}
  .tailor-info .ph{font-size:12.5px;color:var(--ink-faint);font-weight:700;margin-top:1px}
  .tailor-load{font-size:11.5px;font-weight:800;color:var(--sage);background:#eef4ef;padding:5px 10px;border-radius:20px;flex:0 0 auto}
  .tailor-del{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--ink-faint);flex:0 0 auto}
  .tailor-del svg{width:16px;height:16px;stroke:currentColor}

  /* ---------- Reports ---------- */
  .report-hero{background:linear-gradient(135deg,var(--accent),#C85680);border-radius:var(--r);padding:20px;color:#fff;margin-bottom:14px;box-shadow:var(--shadow-lg)}
  .report-hero .l{font-size:12.5px;font-weight:700;opacity:.85;letter-spacing:.03em}
  .report-hero .n{font-family:'Fraunces',serif;font-size:34px;font-weight:600;margin-top:4px;line-height:1}
  .report-hero .sub{font-size:12.5px;opacity:.85;margin-top:8px;font-weight:600}
  .bar-row{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  .bar-row .m{flex:0 0 38px;font-size:12px;font-weight:800;color:var(--ink-soft)}
  .bar-track{flex:1;height:26px;background:var(--surface-2);border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#D26A8E);border-radius:8px;min-width:2px;transition:width .4s}
  .bar-row .val{flex:0 0 auto;font-size:12px;font-weight:800;color:var(--ink);width:64px;text-align:right}

  /* ---------- Bottom nav ---------- */
  .nav{
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:rgba(255,255,255,.94);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    padding:8px 8px calc(8px + var(--safe-b));
    display:flex;max-width:520px;margin:0 auto;justify-content:space-around;align-items:center;
  }
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;color:var(--ink-faint);transition:color .12s}
  .nav-btn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2}
  .nav-btn .lbl{font-size:10.5px;font-weight:800;letter-spacing:.01em}
  .nav-btn.active{color:var(--accent)}
  .fab-slot{flex:0 0 auto;position:relative;width:60px}
  .fab{
    position:absolute;top:-24px;left:50%;transform:translateX(-50%);
    width:56px;height:56px;border-radius:50%;
    background:var(--accent);color:#fff;display:grid;place-items:center;
    box-shadow:0 6px 18px rgba(176,58,99,.45);transition:transform .12s;
  }
  .fab:active{transform:translateX(-50%) scale(.92)}
  .fab svg{width:26px;height:26px;stroke:#fff;stroke-width:2.4}

  /* ---------- Modal / sheet ---------- */
  .sheet-wrap{position:fixed;inset:0;z-index:100;display:none}
  .sheet-wrap.open{display:block}
  .sheet-backdrop{position:absolute;inset:0;background:rgba(58,42,50,.4);backdrop-filter:blur(2px);animation:fade .2s}
  .sheet{
    position:absolute;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;
    background:var(--bg);border-radius:22px 22px 0 0;
    max-height:92vh;overflow-y:auto;padding:8px 18px calc(28px + var(--safe-b));
    animation:slideup .28s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet-handle{width:38px;height:4px;border-radius:3px;background:var(--line-2);margin:8px auto 6px}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;position:sticky;top:0;background:var(--bg);z-index:2}
  .sheet-head h2{font-size:20px}
  .sheet-close{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--line-2);display:grid;place-items:center;color:var(--ink-soft);font-size:18px}

  /* confirm dialog */
  .confirm-wrap{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:32px}
  .confirm-wrap.open{display:flex}
  .confirm-box{background:var(--surface);border-radius:20px;padding:24px;max-width:320px;width:100%;box-shadow:var(--shadow-lg);text-align:center;animation:pop .2s}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
  .confirm-box h3{font-size:18px;margin-bottom:8px}
  .confirm-box p{font-size:13.5px;color:var(--ink-soft);line-height:1.45;margin-bottom:20px}
  .confirm-actions{display:flex;gap:10px}

  /* toast */
  .toast{
    position:fixed;bottom:calc(94px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-weight:700;font-size:13.5px;
    z-index:300;opacity:0;transition:all .25s;pointer-events:none;box-shadow:var(--shadow-lg);white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:800;color:var(--ink-soft);margin-bottom:6px;padding:6px 0}
  .back-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.4;fill:none}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3l3 3.5 4-1-1.5 4L21 12l-3.5 1.5 1 4-4-1.5L12 21l-2.5-4-4 1 1-4L3 12l3.5-1.5-1-4 4 1z" fill="#fff" opacity=".95"/></svg>
      </div>
      <div>
        <h1>Tedora<span>Kids</span></h1>
        <div class="sub">ORDER MANAGER</div>
      </div>
    </div>
  </div>

  <main>
    <!-- DASHBOARD -->
    <section class="view active" id="view-dash"></section>
    <!-- ORDERS -->
    <section class="view" id="view-orders"></section>
    <!-- DETAIL -->
    <section class="view" id="view-detail"></section>
    <!-- TAILORS -->
    <section class="view" id="view-tailors"></section>
    <!-- REPORTS -->
    <section class="view" id="view-reports"></section>
  </main>

  <nav class="nav">
    <button class="nav-btn active" data-nav="dash">
      <svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v9a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z"/></svg>
      <span class="lbl">Home</span>
    </button>
    <button class="nav-btn" data-nav="orders">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h6"/></svg>
      <span class="lbl">Orders</span>
    </button>
    <div class="fab-slot">
      <button class="fab" id="fab-add" aria-label="Add order">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <button class="nav-btn" data-nav="tailors">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
      <span class="lbl">Tailors</span>
    </button>
    <button class="nav-btn" data-nav="reports">
      <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      <span class="lbl">Insights</span>
    </button>
  </nav>
</div>

<!-- Sheet (add/edit) -->
<div class="sheet-wrap" id="sheet">
  <div class="sheet-backdrop" data-close-sheet></div>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2 id="sheet-title">New order</h2>
      <button class="sheet-close" data-close-sheet>&times;</button>
    </div>
    <div id="sheet-body"></div>
  </div>
</div>

<!-- Confirm -->
<div class="confirm-wrap" id="confirm">
  <div class="confirm-box">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
      <button class="btn btn-primary" id="confirm-ok" style="background:var(--accent)">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   TedoraKids Manager — storage layer
   Uses window.storage (Claude artifact) when present,
   falls back to localStorage on your own device.
   ============================================================ */
const KEY = 'tedorakids_data_v1';
const Store = {
  async load(){
    try{
      if(window.storage){
        try{ const r = await window.storage.get(KEY); return r&&r.value ? JSON.parse(r.value) : null; }
        catch(e){ return null; }
      }
      const v = localStorage.getItem(KEY);
      return v ? JSON.parse(v) : null;
    }catch(e){ console.warn('load failed',e); return null; }
  },
  async save(data){
    const str = JSON.stringify(data);
    try{
      if(window.storage){ await window.storage.set(KEY, str); return; }
      localStorage.setItem(KEY, str);
    }catch(e){ console.warn('save failed',e); showToast('Could not save — storage full?'); }
  }
};

/* ---------- Status config (the pipeline) ---------- */
const STAGES = [
  {id:'new',      label:'New Order',            color:'#5B7DB1'},
  {id:'pay_pend', label:'Payment Pending',      color:'#D99A28'},
  {id:'pay_recv', label:'Payment Received',     color:'#2E9E8F'},
  {id:'tailor',   label:'Sent to Tailor',       color:'#6C5CB5'},
  {id:'stitch',   label:'Stitching in Progress',color:'#9A4FB0'},
  {id:'ready',    label:'Ready to Ship',        color:'#2C9CC4'},
  {id:'shipped',  label:'Shipped / Couriered',  color:'#3E74C9'},
  {id:'delivered',label:'Delivered',            color:'#3E9E5C'}
];
const EXTRA = [
  {id:'hold',     label:'On Hold',   color:'#8A8A8A'},
  {id:'cancelled',label:'Cancelled', color:'#C0453F'}
];
const ALL_STATUS = [...STAGES, ...EXTRA];
const statusById = id => ALL_STATUS.find(s=>s.id===id) || STAGES[0];
const stageIndex = id => STAGES.findIndex(s=>s.id===id);

/* ---------- App state ---------- */
let state = { orders:[], tailors:[] };
let currentDetailId = null;
let ordersFilter = 'all';
let ordersSearch = '';
let ordersSort = 'newest';
let editingId = null;
let formImages = [];

/* ---------- Helpers ---------- */
const $ = s => document.querySelector(s);
const el = id => document.getElementById(id);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const inr = n => '₹'+(Number(n)||0).toLocaleString('en-IN');
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmtDate(d){ if(!d) return ''; const dt=new Date(d); if(isNaN(dt)) return ''; return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'}); }
function fmtDateY(d){ if(!d) return ''; const dt=new Date(d); if(isNaN(dt)) return ''; return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
function fmtTime(ts){ const dt=new Date(ts); return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' · '+dt.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'}); }
function daysSince(ts){ return Math.floor((Date.now()-ts)/86400000); }
function balance(o){ return Math.max(0,(Number(o.price)||0)-(Number(o.advance)||0)); }
function initials(name){ return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function showToast(msg){
  const t=el('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

let confirmCb=null;
function askConfirm(title,msg,okLabel,cb){
  el('confirm-title').textContent=title;
  el('confirm-msg').textContent=msg;
  el('confirm-ok').textContent=okLabel||'Confirm';
  confirmCb=cb; el('confirm').classList.add('open');
}
el('confirm-cancel').onclick=()=>{el('confirm').classList.remove('open');confirmCb=null;};
el('confirm-ok').onclick=()=>{el('confirm').classList.remove('open');if(confirmCb)confirmCb();confirmCb=null;};

/* ---------- Persistence ---------- */
async function persist(){ await Store.save(state); }

/* ============================================================
   NAVIGATION
   ============================================================ */
function go(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el('view-'+view).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.nav===view));
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav-btn').forEach(b=>{
  b.onclick=()=>{
    const v=b.dataset.nav;
    if(v==='dash') renderDash();
    if(v==='orders') renderOrders();
    if(v==='tailors') renderTailors();
    if(v==='reports') renderReports();
    go(v);
  };
});
el('fab-add').onclick=()=>openForm();

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDash(){
  const now=new Date(), m=now.getMonth(), y=now.getFullYear();
  const active = state.orders.filter(o=>o.status!=='cancelled');
  const thisMonth = state.orders.filter(o=>{const d=new Date(o.orderDate||o.createdAt);return d.getMonth()===m&&d.getFullYear()===y;});
  const revenueMonth = thisMonth.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(Number(o.price)||0),0);
  const pendingPay = active.reduce((s,o)=>s+balance(o),0);
  const counts={}; STAGES.forEach(s=>counts[s.id]=0);
  state.orders.forEach(o=>{ if(counts[o.status]!=null) counts[o.status]++; });

  // attention: payment pending OR stuck > 4 days (not delivered/cancelled/hold)
  const attention = active.filter(o=>{
    if(o.status==='delivered') return false;
    if(o.status==='pay_pend') return true;
    const last = o.history&&o.history.length?o.history[o.history.length-1].at:o.createdAt;
    return daysSince(last)>=4 && o.status!=='hold';
  }).sort((a,b)=>{
    const la=a.history&&a.history.length?a.history[a.history.length-1].at:a.createdAt;
    const lb=b.history&&b.history.length?b.history[b.history.length-1].at:b.createdAt;
    return la-lb;
  });

  el('view-dash').innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="n accent">${active.length}</div><div class="l">Active orders</div></div>
      <div class="stat"><div class="n">${thisMonth.length}</div><div class="l">Orders this month</div></div>
      <div class="stat"><div class="n sage">${inr(revenueMonth)}</div><div class="l">Value this month</div></div>
      <div class="stat"><div class="n gold">${inr(pendingPay)}</div><div class="l">Payment pending<small>across all orders</small></div></div>
    </div>

    <div class="section-head"><h2>Pipeline</h2><button class="link" data-goto-orders="all">See all</button></div>
    <div class="pipeline-strip">
      ${STAGES.map(s=>`
        <button class="pipe-chip" data-goto-orders="${s.id}">
          <div class="dot" style="background:${s.color}"></div>
          <div class="c">${counts[s.id]}</div>
          <div class="t">${s.label}</div>
        </button>`).join('')}
    </div>

    <div class="section-head"><h2>Needs attention</h2></div>
    <div id="attention-list"></div>
  `;

  const list = el('attention-list');
  if(attention.length===0){
    list.innerHTML = `<div class="empty" style="padding:32px 24px">
      <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 6L9 17l-5-5" stroke="#B03A63" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h3>All caught up</h3><p>No overdue payments or stalled orders right now.</p></div>`;
  } else {
    list.innerHTML = attention.slice(0,6).map(o=>orderCardHTML(o,true)).join('');
  }

  el('view-dash').querySelectorAll('[data-goto-orders]').forEach(b=>{
    b.onclick=()=>{ ordersFilter=b.dataset.gotoOrders; renderOrders(); go('orders'); };
  });
  bindOrderCards(el('view-dash'));
}

/* ============================================================
   ORDER CARD
   ============================================================ */
function orderCardHTML(o, showLate){
  const st=statusById(o.status);
  const bal=balance(o);
  let dateStr='', lateClass='';
  if(o.expectedDate){
    dateStr='Due '+fmtDate(o.expectedDate);
    if(o.status!=='delivered'&&o.status!=='cancelled'&&new Date(o.expectedDate)<new Date(new Date().toDateString())){
      lateClass=' late'; dateStr='Overdue '+fmtDate(o.expectedDate);
    }
  } else { dateStr=fmtDate(o.orderDate||o.createdAt); }
  return `
    <button class="order-card" data-order="${o.id}">
      <div class="oc-top">
        <div>
          <div class="oc-name">${esc(o.customer||'Unnamed')}</div>
          ${o.instagram?`<div class="oc-ig">@${esc(o.instagram.replace(/^@/,''))}</div>`:''}
        </div>
        <span class="badge" style="background:${st.color}18;color:${st.color}"><span class="bd"></span>${st.label}</span>
      </div>
      ${o.dressType?`<div class="oc-desc">${esc(o.dressType)}</div>`:''}
      <div class="oc-meta">
        <div class="oc-amt">${inr(o.price)}${bal>0?`<span class="due">${inr(bal)} due</span>`:''}</div>
        <div class="oc-date${lateClass}">${dateStr}</div>
      </div>
    </button>`;
}
function bindOrderCards(scope){
  scope.querySelectorAll('[data-order]').forEach(b=>{
    b.onclick=()=>openDetail(b.dataset.order);
  });
}

/* ============================================================
   ORDERS LIST
   ============================================================ */
function renderOrders(){
  const filters=[{id:'all',label:'All'},...STAGES,...EXTRA];
  let list=[...state.orders];
  if(ordersFilter!=='all') list=list.filter(o=>o.status===ordersFilter);
  if(ordersSearch){
    const q=ordersSearch.toLowerCase();
    list=list.filter(o=>(o.customer||'').toLowerCase().includes(q)||(o.instagram||'').toLowerCase().includes(q)||(o.dressType||'').toLowerCase().includes(q));
  }
  list.sort((a,b)=>{
    if(ordersSort==='newest') return (b.orderDate?new Date(b.orderDate):b.createdAt)-(a.orderDate?new Date(a.orderDate):a.createdAt);
    if(ordersSort==='delivery'){const da=a.expectedDate?new Date(a.expectedDate):Infinity,db=b.expectedDate?new Date(b.expectedDate):Infinity;return da-db;}
    if(ordersSort==='amount') return (Number(b.price)||0)-(Number(a.price)||0);
    return 0;
  });

  el('view-orders').innerHTML=`
    <h2 class="screen-title">Orders</h2>
    <div class="searchbar">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
      <input id="order-search" placeholder="Search name, Instagram, dress…" value="${esc(ordersSearch)}">
    </div>
    <div class="filter-row" id="filter-row">
      ${filters.map(f=>`<button class="fchip${ordersFilter===f.id?' active':''}" data-filter="${f.id}">${f.label}</button>`).join('')}
    </div>
    <div class="sort-row">
      <span>Sort</span>
      <select id="order-sort">
        <option value="newest"${ordersSort==='newest'?' selected':''}>Newest first</option>
        <option value="delivery"${ordersSort==='delivery'?' selected':''}>By delivery date</option>
        <option value="amount"${ordersSort==='amount'?' selected':''}>By amount</option>
      </select>
      <span style="margin-left:auto;color:var(--ink-faint)">${list.length} order${list.length!==1?'s':''}</span>
    </div>
    <div id="orders-list"></div>
  `;

  const ol=el('orders-list');
  if(list.length===0){
    ol.innerHTML=`<div class="empty">
      <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" stroke="#B03A63"/><path d="M8 10h8M8 14h5" stroke="#B03A63" stroke-linecap="round"/></svg></div>
      <h3>${ordersSearch||ordersFilter!=='all'?'No matching orders':'No orders yet'}</h3>
      <p>${ordersSearch||ordersFilter!=='all'?'Try a different search or filter.':'Tap the + button to add your first order.'}</p>
    </div>`;
  } else {
    ol.innerHTML=list.map(o=>orderCardHTML(o)).join('');
    bindOrderCards(ol);
  }

  el('order-search').oninput=e=>{ ordersSearch=e.target.value; const cur=e.target; renderOrders(); const ns=el('order-search'); ns.focus(); ns.setSelectionRange(cur.value.length,cur.value.length); };
  el('order-sort').onchange=e=>{ ordersSort=e.target.value; renderOrders(); };
  el('filter-row').querySelectorAll('[data-filter]').forEach(b=>{
    b.onclick=()=>{ ordersFilter=b.dataset.filter; renderOrders(); };
  });
}

/* ============================================================
   ORDER DETAIL
   ============================================================ */
function openDetail(id){
  currentDetailId=id;
  renderDetail();
  go('detail');
}
function renderDetail(){
  const o=state.orders.find(x=>x.id===currentDetailId);
  if(!o){ go('orders'); return; }
  const st=statusById(o.status);
  const bal=balance(o);
  const idx=stageIndex(o.status);
  const isExtra=idx<0;
  const phone=(o.phone||'').replace(/\D/g,'');

  const payBadge = o.payStatus||'Pending';
  const payColor = payBadge==='Paid'?'#3E9E5C':payBadge==='Partial'?'#D99A28':'#C0453F';

  // stitched pipeline
  let stitchHTML='';
  if(!isExtra){
    stitchHTML=STAGES.map((s,i)=>{
      const done=i<idx, cur=i===idx;
      const hist=(o.history||[]).find(h=>h.status===s.id);
      return `<div class="stitch-step ${done?'done':''} ${cur?'current':''}">
        <div class="stitch-node"></div>
        <div class="stitch-txt">${s.label}</div>
        ${hist?`<div class="stitch-time">${fmtTime(hist.at)}</div>`:''}
      </div>`;
    }).join('');
  } else {
    stitchHTML=`<div class="stitch-step current"><div class="stitch-node" style="border-color:${st.color};box-shadow:0 0 0 4px ${st.color}22"></div><div class="stitch-txt">${st.label}</div>${(o.history||[]).length?`<div class="stitch-time">${fmtTime(o.history[o.history.length-1].at)}</div>`:''}</div>`;
  }

  const canForward = idx>=0 && idx<STAGES.length-1;
  const canBack = idx>0;
  const nextLabel = canForward?STAGES[idx+1].label:'';

  const tailor = state.tailors.find(t=>t.id===o.tailorId);

  el('view-detail').innerHTML=`
    <button class="back-btn" id="detail-back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Orders</button>

    <div class="detail-hero">
      <div class="dh-name">${esc(o.customer||'Unnamed')}</div>
      ${o.instagram?`<div class="dh-ig">@${esc(o.instagram.replace(/^@/,''))}</div>`:''}
      <div class="dh-badges">
        <span class="badge" style="background:${st.color}18;color:${st.color}"><span class="bd"></span>${st.label}</span>
        <span class="badge" style="background:${payColor}18;color:${payColor}"><span class="bd"></span>${payBadge}${bal>0?' · '+inr(bal)+' due':''}</span>
      </div>
    </div>

    ${phone?`<a class="wa-btn" href="https://wa.me/${phone.length===10?'91'+phone:phone}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="#1b7a43"><path d="M12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.5A10 10 0 1012 2zm5.4 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .2-3.3-.7-2.8-1.1-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8s.7-2 .9-2.2c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5.2.5.7 1.8.8 1.9 0 .2.1.3 0 .5-.3.5-.5.8-.7 1-.2.2-.4.4-.2.8.2.3.9 1.5 2 2.4 1.4 1.2 2.5 1.6 2.8 1.7.3.1.5.1.7-.1.2-.2.8-.9 1-1.2.2-.3.4-.2.7-.1.3.1 1.8.8 2.1 1 .3.1.5.2.6.3.1.2.1.7-.1 1.3z"/></svg>
      Message on WhatsApp
    </a>`:''}

    <div class="stitch">
      <div class="stitch-label">Order Journey</div>
      <div class="stitch-track">${stitchHTML}</div>
    </div>

    <div class="status-actions">
      ${canBack?`<button class="btn btn-ghost" id="status-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg> Back</button>`:''}
      ${canForward?`<button class="btn btn-primary" id="status-fwd">Move to: ${nextLabel} <svg viewBox="0 0 24 24" fill="none" stroke="#fff"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>`:''}
      ${o.status==='delivered'?`<button class="btn btn-ghost btn-block" disabled style="opacity:.6">✓ Order delivered</button>`:''}
    </div>

    <div class="info-card">
      <div class="ic-head">Order details</div>
      <div class="info-row"><div class="k">Dress</div><div class="v ${o.dressType?'':'empty-v'}">${o.dressType?esc(o.dressType):'—'}</div></div>
      <div class="info-row"><div class="k">Size / measure</div><div class="v ${o.size?'':'empty-v'}">${o.size?esc(o.size):'—'}</div></div>
      <div class="info-row"><div class="k">Customization</div><div class="v ${o.custom?'':'empty-v'}">${o.custom?esc(o.custom):'—'}</div></div>
      <div class="info-row"><div class="k">Tailor</div><div class="v ${tailor?'':'empty-v'}">${tailor?esc(tailor.name):'Not assigned'}</div></div>
    </div>

    <div class="info-card">
      <div class="ic-head">Payment</div>
      <div class="info-row"><div class="k">Total price</div><div class="v">${inr(o.price)}</div></div>
      <div class="info-row"><div class="k">Advance paid</div><div class="v">${inr(o.advance)}</div></div>
      <div class="info-row"><div class="k">Balance due</div><div class="v" style="color:${bal>0?'var(--accent)':'var(--sage)'}">${inr(bal)}</div></div>
      <div class="info-row"><div class="k">Payment date</div><div class="v ${o.payDate?'':'empty-v'}">${o.payDate?fmtDateY(o.payDate):'—'}</div></div>
    </div>

    <div class="info-card">
      <div class="ic-head">Shipping</div>
      <div class="info-row"><div class="k">Address</div><div class="v ${o.address?'':'empty-v'}">${o.address?esc(o.address):'—'}</div></div>
      <div class="info-row"><div class="k">Phone</div><div class="v ${o.phone?'':'empty-v'}">${o.phone?esc(o.phone):'—'}</div></div>
      ${(o.status==='shipped'||o.status==='delivered'||o.courier||o.tracking)?`
      <div class="info-row"><div class="k">Courier</div><div class="v ${o.courier?'':'empty-v'}">${o.courier?esc(o.courier):'—'}</div></div>
      <div class="info-row"><div class="k">Tracking #</div><div class="v ${o.tracking?'':'empty-v'}">${o.tracking?esc(o.tracking):'—'}</div></div>`:''}
      <div class="info-row"><div class="k">Ordered</div><div class="v">${fmtDateY(o.orderDate||o.createdAt)}</div></div>
      <div class="info-row"><div class="k">Expected</div><div class="v ${o.expectedDate?'':'empty-v'}">${o.expectedDate?fmtDateY(o.expectedDate):'—'}</div></div>
    </div>

    ${o.notes?`<div class="info-card"><div class="ic-head">Notes</div><div class="info-row"><div class="v">${esc(o.notes)}</div></div></div>`:''}

    ${(o.images&&o.images.length)?`<div class="info-card"><div class="ic-head">Reference photos</div><div class="img-strip">${o.images.map(src=>`<img src="${src}" alt="reference">`).join('')}</div></div>`:''}

    <div style="display:flex;gap:10px;margin:16px 0 8px">
      <button class="btn btn-ghost" id="detail-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z" stroke-linecap="round" stroke-linejoin="round"/></svg> Edit</button>
      <button class="btn btn-ghost" id="detail-status"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2" stroke-linecap="round"/></svg> Set status</button>
    </div>
    <button class="btn btn-ghost btn-block" id="detail-delete" style="color:#C0453F;margin-bottom:8px">Delete order</button>
  `;

  el('detail-back').onclick=()=>{renderOrders();go('orders');};
  el('detail-edit').onclick=()=>openForm(o.id);
  el('detail-delete').onclick=()=>{
    askConfirm('Delete this order?','This permanently removes '+(o.customer||'this order')+'. This can’t be undone.','Delete',async()=>{
      state.orders=state.orders.filter(x=>x.id!==o.id); await persist(); showToast('Order deleted'); renderOrders(); go('orders');
    });
  };
  if(el('status-fwd')) el('status-fwd').onclick=()=>changeStatus(o.id,STAGES[idx+1].id);
  if(el('status-back')) el('status-back').onclick=()=>changeStatus(o.id,STAGES[idx-1].id);
  el('detail-status').onclick=()=>openStatusPicker(o.id);
}

async function changeStatus(id,newStatus){
  const o=state.orders.find(x=>x.id===id);
  if(!o) return;
  if(newStatus==='cancelled'){
    askConfirm('Cancel this order?','Mark '+(o.customer||'this order')+' as cancelled?','Cancel order',async()=>{ await applyStatus(o,newStatus); });
    return;
  }
  await applyStatus(o,newStatus);
}
async function applyStatus(o,newStatus){
  o.status=newStatus;
  o.history=o.history||[];
  o.history.push({status:newStatus,at:Date.now()});
  // auto payment sync
  if(newStatus==='pay_recv'&&o.payStatus!=='Paid'){ if(balance(o)<=0) o.payStatus='Paid'; }
  await persist();
  showToast('Moved to '+statusById(newStatus).label);
  renderDetail();
}

function renderFormImages(){
  const box=el('img-upload');
  box.innerHTML = formImages.map((src,i)=>`<div class="img-thumb"><img src="${src}"><button class="x" data-rmimg="${i}">&times;</button></div>`).join('')
    + `<button class="img-add" type="button"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg></button>`;
  box.querySelectorAll('[data-rmimg]').forEach(b=>b.onclick=e=>{e.stopPropagation();formImages.splice(+b.dataset.rmimg,1);renderFormImages();});
}
function handleImageFiles(e){
  const files=[...e.target.files];
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const max=760, scale=Math.min(1,max/Math.max(img.width,img.height));
        const c=document.createElement('canvas');
        c.width=img.width*scale; c.height=img.height*scale;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        formImages.push(c.toDataURL('image/jpeg',0.6));
        renderFormImages();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}

async function saveForm(){
  const val=id=>{const e=el(id);return e?e.value.trim():'';};
  const customer=val('f-customer');
  if(!customer){ showToast('Please enter a customer name'); el('f-customer').focus(); return; }
  const data={
    customer,
    instagram:val('f-instagram'),
    phone:val('f-phone'),
    address:val('f-address'),
    dressType:val('f-dress'),
    size:val('f-size'),
    custom:val('f-custom'),
    tailorId:val('f-tailor'),
    price:Number(val('f-price'))||0,
    advance:Number(val('f-advance'))||0,
    payStatus:val('f-paystatus'),
    payDate:val('f-paydate'),
    orderDate:val('f-orderdate'),
    expectedDate:val('f-expected'),
    courier:val('f-courier'),
    tracking:val('f-tracking'),
    notes:val('f-notes'),
    images:[...formImages]
  };

  if(editingId){
    const o=state.orders.find(x=>x.id===editingId);
    Object.assign(o,data);
    await persist(); closeSheet(); showToast('Order updated');
    currentDetailId=editingId; renderDetail(); go('detail');
  } else {
    const status=val('f-status')||'new';
    const now=Date.now();
    const o={id:uid(),createdAt:now,status,history:[{status,at:now}],...data};
    state.orders.unshift(o);
    await persist(); closeSheet(); showToast('Order added');
    currentDetailId=o.id; renderDetail(); go('detail');
  }
}

      </div>`;
    }).join('');

  el('add-tailor').onclick=openTailorForm;

      const t=state.tailors.find(x=>x.id===b.dataset.delTailor);
      askConfirm('Remove tailor?','Remove '+t.name+'? Orders assigned to them will show as unassigned.','Remove',async()=>{
        state.tailors=state.tailors.filter(x=>x.id!==t.id);
        state.orders.forEach(o=>{if(o.tailorId===t.id)o.tailorId='';});

function openTailorForm(){
  el('sheet-title').textContent='Add tailor';
  el('sheet-body').innerHTML=`
    <div class="form-group"><label>Tailor name</label><input id="t-name" placeholder="e.g. Lakshmi"></div>
    <div class="form-group"><label>Phone number</label><input id="t-phone" type="tel" placeholder="Optional"></div>
    <button class="btn btn-primary btn-block" id="t-save">Add tailor</button>
    <div style="height:6px"></div>`;
  el('t-save').onclick=async()=>{
    const name=el('t-name').value.trim();
    if(!name){ showToast('Enter a name'); return; }
    state.tailors.push({id:uid(),name,phone:el('t-phone').value.trim()});
    await persist(); closeSheet(); showToast('Tailor added'); renderTailors();
  };
  openSheet();
  setTimeout(()=>el('t-name').focus(),300);
}

/* ============================================================
   REPORTS
   ============================================================ */
function renderReports(){
  const active=state.orders.filter(o=>o.status!=='cancelled');
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  const monthOrders=active.filter(o=>{const d=new Date(o.orderDate||o.createdAt);return d.getMonth()===m&&d.getFullYear()===y;});
  const revenueMonth=monthOrders.reduce((s,o)=>s+(Number(o.price)||0),0);
  const collectedMonth=monthOrders.reduce((s,o)=>s+(Number(o.advance)||0),0);
  const delivered=active.filter(o=>o.status==='delivered').length;
  const pendingPay=active.reduce((s,o)=>s+balance(o),0);
  const totalOrders=active.length;

  // last 6 months revenue
  const months=[];
  for(let i=5;i>=0;i--){ const d=new Date(y,m-i,1); months.push({key:d.getMonth()+'-'+d.getFullYear(),label:d.toLocaleDateString('en-IN',{month:'short'}),total:0}); }
  active.forEach(o=>{ const d=new Date(o.orderDate||o.createdAt); const k=d.getMonth()+'-'+d.getFullYear(); const mm=months.find(x=>x.key===k); if(mm) mm.total+=Number(o.price)||0; });
  const maxM=Math.max(1,...months.map(x=>x.total));

  el('view-reports').innerHTML=`
    <h2 class="screen-title">Insights</h2>
    <div class="report-hero">
      <div class="l">VALUE THIS MONTH</div>
      <div class="n">${inr(revenueMonth)}</div>
      <div class="sub">${monthOrders.length} order${monthOrders.length!==1?'s':''} · ${inr(collectedMonth)} collected so far</div>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="n">${totalOrders}</div><div class="l">Total active orders</div></div>
      <div class="stat"><div class="n sage">${delivered}</div><div class="l">Delivered</div></div>
      <div class="stat"><div class="n gold">${inr(pendingPay)}</div><div class="l">Payment pending</div></div>
      <div class="stat"><div class="n accent">${state.tailors.length}</div><div class="l">Tailors</div></div>
    </div>

    <div class="section-head"><h2>Order value · last 6 months</h2></div>
    <div class="info-card" style="padding:16px 16px 6px">
      ${months.map(mm=>`
        <div class="bar-row">
          <div class="m">${mm.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(mm.total/maxM*100).toFixed(1)}%"></div></div>
          <div class="val">${mm.total?inr(mm.total):'—'}</div>
        </div>`).join('')}
    </div>
    <p style="font-size:12px;color:var(--ink-faint);text-align:center;margin-top:18px;font-weight:600">Cancelled orders are excluded from all figures.</p>
  `;
}
